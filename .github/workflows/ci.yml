name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --coverage --run

      - name: Build
        run: npm run build
